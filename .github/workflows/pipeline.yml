name: Visit With Us MLOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  mlops:

    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}

    steps:

    ############################################################
    # Checkout
    ############################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ############################################################
    # Python
    ############################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    ############################################################
    # Install
    ############################################################

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    ############################################################
    # Verify Environment
    ############################################################

    - name: Verify Environment
      run: |
        python scripts/verify_environment.py

    ############################################################
    # Data Registration
    ############################################################

    - name: Register Dataset
      run: |
        python src/data_registration.py

    ############################################################
    # Data Preparation
    ############################################################

    - name: Data Preparation
      run: |
        python src/data_preparation.py

    ############################################################
    # Model Training
    ############################################################

    - name: Train Model
      run: |
        python src/train.py

    ############################################################
    # Evaluation
    ############################################################

    - name: Evaluate Model
      run: |
        python src/evaluate.py

    ############################################################
    # Register Model
    ############################################################

    - name: Upload Model
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python src/registry.py

    ############################################################
    # Verify Pipeline
    ############################################################

    - name: Verify Pipeline
      run: |
        python scripts/verify_pipeline.py

    ############################################################
    # Upload Reports
    ############################################################

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: reports/

    ############################################################
    # Upload Models
    ############################################################

    - name: Upload Models
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: models/

    ############################################################
    # Finished
    ############################################################

    - name: Completed
      run: |
        echo "Pipeline Completed Successfully"
